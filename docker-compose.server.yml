services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-automusic}
      POSTGRES_USER: ${POSTGRES_USER:-automusic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automusic}
    ports:
      - "${POSTGRES_PORT:-3208}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:prod:gateway
    environment:
      PORT: 3000
      CATALOG_SERVICE_HOST: catalog-service
      CATALOG_SERVICE_PORT: 4001
      CONTENT_SERVICE_HOST: content-service
      CONTENT_SERVICE_PORT: 4002
      USERS_SERVICE_HOST: users-service
      USERS_SERVICE_PORT: 4003
    ports:
      - "${BACKEND_PORT:-3108}:3000"
    depends_on:
      - catalog-service
      - content-service
      - users-service
    restart: unless-stopped

  catalog-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:prod:catalog
    environment:
      SERVICE_PORT: 4001
    restart: unless-stopped

  content-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:prod:content
    environment:
      SERVICE_PORT: 4002
    restart: unless-stopped

  users-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:prod:users
    environment:
      SERVICE_PORT: 4003
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-automusic}
      POSTGRES_USER: ${POSTGRES_USER:-automusic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automusic}
    depends_on:
      - postgres
    restart: unless-stopped

  edge:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api-gateway
    ports:
      - "${FRONTEND_PORT:-3008}:80"
    volumes:
      - ./infra/nginx/default.server.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
