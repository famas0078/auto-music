services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: automusic
      POSTGRES_USER: automusic
      POSTGRES_PASSWORD: automusic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  edge:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api-gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: /api
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:gateway
    environment:
      PORT: 3000
      CATALOG_SERVICE_HOST: catalog-service
      CATALOG_SERVICE_PORT: 4001
      CONTENT_SERVICE_HOST: content-service
      CONTENT_SERVICE_PORT: 4002
      USERS_SERVICE_HOST: users-service
      USERS_SERVICE_PORT: 4003
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: UseFsEventsWithFallbackDynamicPolling
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    expose:
      - "3000"
    depends_on:
      - catalog-service
      - content-service
      - users-service

  catalog-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:catalog
    environment:
      SERVICE_PORT: 4001
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: UseFsEventsWithFallbackDynamicPolling
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    expose:
      - "4001"

  content-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:content
    environment:
      SERVICE_PORT: 4002
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: UseFsEventsWithFallbackDynamicPolling
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    expose:
      - "4002"

  users-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:users
    environment:
      SERVICE_PORT: 4003
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: automusic
      POSTGRES_USER: automusic
      POSTGRES_PASSWORD: automusic
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: UseFsEventsWithFallbackDynamicPolling
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    expose:
      - "4003"
    depends_on:
      - postgres

volumes:
  frontend_node_modules:
  backend_node_modules:
  postgres_data:
